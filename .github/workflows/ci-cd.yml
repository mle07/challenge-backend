name: Express Backend CI/CD

on:
  push:
    types: [closed]
    branches:
      - main

jobs:
  build:
    if: github.event.push.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

  deploy-main:
    name: Deploy to main
    needs: build
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    environment: main

    steps:
      - name: Publish package
        run: yarn publish --access restricted
